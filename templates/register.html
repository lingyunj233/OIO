<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OIO - Register</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg-deep: #0c0e14;
    --bg-panel: #13161e;
    --bg-card: #1a1e2a;
    --border: #2a2e3a;
    --text-primary: #e8eaf0;
    --text-secondary: #8b90a0;
    --text-muted: #5a5f72;
    --accent: #6c8aff;
    --accent-hover: #8aa4ff;
    --red: #f87171;
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .auth-container {
    width: 400px;
    background: var(--bg-panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 40px;
    animation: fadeIn 0.4s ease;
  }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .auth-logo { text-align: center; margin-bottom: 32px; }
  .auth-logo h1 { font-size: 28px; font-weight: 700; color: var(--accent); }
  .auth-logo p { color: var(--text-muted); font-size: 14px; margin-top: 6px; }
  .form-group { margin-bottom: 18px; }
  .form-group label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
  .form-group input {
    width: 100%; padding: 11px 14px; border-radius: 8px;
    border: 1px solid var(--border); background: var(--bg-card);
    color: var(--text-primary); font-family: inherit; font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }
  .form-group input:focus { border-color: var(--accent); }
  .form-group input::placeholder { color: var(--text-muted); }
  .btn-primary {
    width: 100%; padding: 12px; border: none; border-radius: 10px;
    background: var(--accent); color: #fff; font-family: inherit;
    font-size: 15px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 8px;
  }
  .btn-primary:hover { background: var(--accent-hover); transform: translateY(-1px); box-shadow: 0 4px 16px rgba(108, 138, 255, 0.3); }
  .auth-footer { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-muted); }
  .auth-footer a { color: var(--accent); text-decoration: none; font-weight: 500; }
  .auth-footer a:hover { text-decoration: underline; }
  .error-msg { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--red); padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; }
</style>
</head>
<body>
<div class="auth-container">
  <div class="auth-logo">
    <h1>OIO</h1>
    <p>Create a new account</p>
  </div>

  {% if error %}
  <div class="error-msg">{{ error }}</div>
  {% endif %}

  <form method="POST" action="/register">
    <div class="form-group">
      <label>Display Name</label>
      <input type="text" name="display_name" placeholder="e.g. John Smith" required>
    </div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" name="username" placeholder="Choose a username" required>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" name="password" placeholder="Choose a password" required>
    </div>
    <button type="submit" class="btn-primary">Create Account</button>
  </form>

  <div class="auth-footer">
    Already have an account? <a href="/login">Sign in</a>
  </div>
</div>
</body>
</html>
